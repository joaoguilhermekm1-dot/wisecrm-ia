services:
  - type: web
    name: wisecrm-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wisecrm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DIRECT_URL
        fromDatabase:
          name: wisecrm-db
          property: connectionString
      - key: PORT
        value: 3001

databases:
  - name: wisecrm-db
    databaseName: wisecrm
    user: wiseadmin
    plan: free
